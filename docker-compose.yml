# ==============================================================
# NovaTicket — Docker Compose
# Full Stack Environment (Sprint 9)
# ==============================================================

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: novaticket_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "${MSSQL_PASSWORD}",
          "-Q", "SELECT 1",
          "-No"
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novaticket_backend
    env_file:
      - ./backend/.env
    environment:
      # Override the database host to point to the sqlserver container
      - MSSQL_SERVER=sqlserver
      # Test database host for pytest
      - TEST_DB_HOST=sqlserver
      # Add frontend Docker port (80) to allowed origins
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:80,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Mount models folder so ML artifacts persist outside container
      - ./backend/models:/app/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novaticket_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local
