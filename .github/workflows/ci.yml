name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Spin up SQL Server container for tests
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: NovaTicket@2024!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        # Wait until SQL Server is ready
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NovaTicket@2024! -Q 'SELECT 1' -No"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
        
    - name: Install dependencies and ODBC Driver
      run: |
        python -m pip install --upgrade pip
        
        # Install Microsoft ODBC Driver 18 for Linux (Ubuntu)
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
        curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev
        
        cd backend
        pip install -r requirements.txt

    - name: Create Test Database
      run: |
        # Execute sqlcmd inside the running SQL Server container to create the test database
        docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'NovaTicket@2024!' -Q "CREATE DATABASE novaticket_test" -No
        
    - name: Run Pytest
      env:
        SECRET_KEY: "test-secret-key-for-ci-pipeline"
        MSSQL_PASSWORD: "NovaTicket@2024!"
      run: |
        cd backend
        pytest -v
