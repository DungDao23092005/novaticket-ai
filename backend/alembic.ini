# ==============================================================
# Alembic Configuration File
# ==============================================================
# This file is read by alembic commands (upgrade, downgrade, etc.)
#
# The sqlalchemy.url is intentionally left as a placeholder.
# The actual URL is loaded from app settings in migrations/env.py
# to keep credentials out of this file (which IS committed to git).
# ==============================================================

[alembic]
# Path to migration scripts, relative to this file
script_location = migrations

# Template for migration file names
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d = timestamp prefix
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Do NOT set sqlalchemy.url here — it is configured dynamically
# in migrations/env.py from app/core/config.py to avoid
# hardcoding credentials in this committed file.

# Alembic will look for .env in the directory where alembic command is run
# (which is backend/)
prepend_sys_path = .

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
